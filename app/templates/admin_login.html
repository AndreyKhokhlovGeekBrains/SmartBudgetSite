{% extends "base.html" %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/admin_products.css') }}">
{% endblock %}

{% block content %}
<div class="admin-form">
    <h1 class="admin-form-title">Admin Login</h1>

    <form method="post" action="/admin/login" class="admin-form-body">

        <div class="form-group">
            <label>Admin token</label>
            <input type="password" name="token" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Sign in</button>
        </div>

    </form>
</div>
{% endblock %}
