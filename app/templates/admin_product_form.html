{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px;">
    <h1>{{ page_title }}</h1>

    <form method="post" action="{{ form_action }}">
        <div>
            <label>Name</label><br>
            <input type="text" name="name" value="{{ product.name if product else '' }}" required>
        </div>

        <div>
            <label>Slug</label><br>
            <input type="text" name="slug" value="{{ product.slug if product else '' }}" required>
        </div>

        <div>
            <label>Edition</label><br>
            <select name="edition" required>
                {% for e in allowed_editions %}
                <option value="{{ e }}"
                    {% if product and product.edition == e %}selected{% endif %}>
                    {{ e }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label>Version</label><br>
            <input type="text" name="version" value="{{ product.version if product else '' }}" required>
        </div>

        <div>
            <label>Price</label><br>
            <input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required>
        </div>

        <div>
            <label>Status</label><br>
            <select name="status" required>
                {% for s in allowed_statuses %}
                <option value="{{ s }}"
                    {% if product and product.status == s %}selected{% endif %}>
                    {{ s }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-top: 16px;">
            <button type="submit">Save</button>
        </div>
    </form>
</div>
{% endblock %}
