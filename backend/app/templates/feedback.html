{% extends "base.html" %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/feedback.css') }}">
{% endblock %}

{% block title %}{{ t("feedback_title") }}{% endblock %}

{% block content %}
<section class="feedback-page">
    <h1 class="feedback-page__title">{{ t("feedback_title") }}</h1>
    <p class="feedback-page__intro">{{ t("feedback_intro") }}</p>

    <form class="feedback-form" id="feedback-form">
        <label class="feedback-form__label" for="message_type">{{ t("feedback_type_label") }}</label>
        <select class="feedback-form__control" id="message_type" name="message_type" required>
            <option value="site_issue">{{ t("feedback_type_site_issue") }}</option>
            <option value="general_question">{{ t("feedback_type_general_question") }}</option>
            <option value="product_feedback">{{ t("feedback_type_product_feedback") }}</option>
        </select>

        <label class="feedback-form__label" for="name">{{ t("feedback_name_label") }}</label>
        <input class="feedback-form__control" type="text" id="name" name="name" maxlength="200">

        <label class="feedback-form__label" for="email">
            {{ t("feedback_email_label") }}
            <span class="feedback-form__hint" id="email-hint">
                {{ t("feedback_email_hint") }}
            </span>
        </label>

        <input class="feedback-form__control" type="email" id="email" name="email">

        <div class="feedback-purchase-status" id="purchase-status" style="display: none;"></div>

        <div id="purchaseSelectorGroup" style="display: none;">
            <label class="feedback-form__label" for="purchase_select">
                {{ t("feedback_purchase_label") }}
            </label>
            <select class="feedback-form__control" id="purchase_select" name="purchase_select">
                <option value="">
                    {{ t("feedback_purchase_placeholder") }}
                </option>
            </select>
        </div>

        <div id="subjectGroup" style="display: none;">
            <label class="feedback-form__label" for="subject">{{ t("feedback_subject_label") }}</label>
            <input class="feedback-form__control" type="text" id="subject" name="subject" maxlength="200" required>
        </div>

        <div id="messageGroup" style="display: none;">
            <label class="feedback-form__label" for="message">{{ t("feedback_message_label") }}</label>
            <textarea class="feedback-form__control feedback-form__control--textarea" id="message" name="message" required></textarea>
        </div>

        <input type="hidden" id="page_url" name="page_url" value="{{ request.url.path }}">

        <button class="btn btn-primary" type="submit">{{ t("feedback_submit") }}</button>

        <p class="feedback-form__status" id="feedback-status"></p>
    </form>
</section>

<script>
window.feedbackTexts = {
    checkingPurchase: "{{ t('feedback_checking_purchase') }}",
    purchaseConfirmed: "{{ t('feedback_purchase_confirmed') }}",
    noPurchaseFound: "{{ t('feedback_no_purchase_found') }}",
    purchaseCheckFailed: "{{ t('feedback_purchase_check_failed') }}",
    productFallback: "{{ t('feedback_product_fallback') }}",
    sending: "{{ t('feedback_sending') }}",
    sentSuccessPrefix: "{{ t('feedback_sent_success_prefix') }}",
    sendFailed: "{{ t('feedback_send_failed') }}"
};
</script>
<script src="{{ url_for('static', path='js/feedback.js') }}"></script>

{% endblock %}
